---
name: Deploy Infrastructure

on:
  push:
    branches: [main]

jobs:
  deploy-linux:
    name: Linux & AWS Playbooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and dependencies
        run: |
          sudo apt update
          sudo apt install -y ansible python3-boto3

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install amazon.aws
          ansible-galaxy collection install community.postgresql

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/cluster01
          echo "${{ secrets.SSH_PRIVATE_KEY_2 }}" > ~/.ssh/cluster02
          chmod 600 ~/.ssh/cluster01 ~/.ssh/cluster02
          ssh-keygen -y -f ~/.ssh/cluster01 > ~/.ssh/cluster01.pub
          ssh-keyscan -p 2227 51.75.64.176 >> ~/.ssh/known_hosts
          ssh-keyscan -p 2228 51.75.64.176 >> ~/.ssh/known_hosts

      - name: Run hardening
        run: ansible-playbook -i inventory.ini hardening.yml

      - name: Run monitoring
        run: ansible-playbook -i inventory.ini monitoring.yml

      - name: Run deploy-app
        run: ansible-playbook -i inventory.ini deploy-app.yml

      - name: Run AWS infrastructure
        run: ansible-playbook -i inventory.ini aws-infrastructure.yml

      - name: Run EC2 storage
        run: ansible-playbook -i inventory.ini ec2-storage.yml

      - name: Run storage management
        run: ansible-playbook -i inventory.ini storage-management.yml

  deploy-windows:
    name: Windows Server Playbook
    runs-on: ubuntu-latest
    needs: deploy-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and WinRM
        run: |
          sudo apt update
          sudo apt install -y ansible python3-winrm

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install ansible.windows
          ansible-galaxy collection install community.windows

      - name: Run Windows management
        run: >
          ansible-playbook -i inventory.ini windows-management.yml
          -e "win_admin_password=${{ secrets.WIN_ADMIN_PASSWORD }}"
          -e "ansible_winrm_read_timeout_sec=120"
          -e "ansible_winrm_operation_timeout_sec=90"

---
name: Deploy Infrastructure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-linux:
    name: Linux & AWS Playbooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and dependencies
        run: |
          sudo apt update
          sudo apt install -y ansible python3-boto3

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install amazon.aws
          ansible-galaxy collection install community.postgresql

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/cluster01
          echo "${{ secrets.SSH_PRIVATE_KEY_2 }}" > ~/.ssh/cluster02
          chmod 600 ~/.ssh/cluster01 ~/.ssh/cluster02
          ssh-keygen -y -f ~/.ssh/cluster01 > ~/.ssh/cluster01.pub
          ssh-keyscan -p 2227 51.75.64.176 >> ~/.ssh/known_hosts
          ssh-keyscan -p 2228 51.75.64.176 >> ~/.ssh/known_hosts

      - name: Run hardening
        run: ansible-playbook -i inventory.ini hardening.yml

      - name: Run monitoring
        run: ansible-playbook -i inventory.ini monitoring.yml

      - name: Run deploy-app
        run: ansible-playbook -i inventory.ini deploy-app.yml

      - name: Run AWS infrastructure (LocalStack - may fail in CI)
        run: ansible-playbook -i inventory.ini aws-infrastructure.yml
        continue-on-error: true

      - name: Run EC2 storage (LocalStack - may fail in CI)
        run: ansible-playbook -i inventory.ini ec2-storage.yml
        continue-on-error: true

      - name: Run storage management
        run: ansible-playbook -i inventory.ini storage-management.yml

  deploy-windows:
    name: Windows Server (DSC)
    runs-on: ubuntu-latest
    needs: deploy-linux

    env:
      JUMP_HOST: 51.75.64.176
      JUMP_PORT: 2227
      JUMP_USER: root
      WIN_HOST: ${{ secrets.WIN_HOST }}
      WIN_SSH_PORT: ${{ secrets.WIN_SSH_PORT || '2229' }}
      WIN_SSH_USER: ${{ secrets.WIN_SSH_USER || 'Administrator' }}
      DSC_PATH: 'C:\dsc'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH keys and jump host config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/cluster01
          echo "${{ secrets.WIN_SSH_PRIVATE_KEY }}" > ~/.ssh/win_key
          chmod 600 ~/.ssh/cluster01 ~/.ssh/win_key
          ssh-keyscan -p $JUMP_PORT $JUMP_HOST >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config << 'SSHEOF'
          Host jump
            HostName 51.75.64.176
            Port 2227
            User root
            IdentityFile ~/.ssh/cluster01
            StrictHostKeyChecking no

          Host winserver
            HostName $WIN_HOST_PLACEHOLDER
            Port $WIN_PORT_PLACEHOLDER
            User $WIN_USER_PLACEHOLDER
            IdentityFile ~/.ssh/win_key
            ProxyJump jump
            StrictHostKeyChecking no
          SSHEOF
          sed -i "s|\$WIN_HOST_PLACEHOLDER|$WIN_HOST|g" ~/.ssh/config
          sed -i "s|\$WIN_PORT_PLACEHOLDER|$WIN_SSH_PORT|g" ~/.ssh/config
          sed -i "s|\$WIN_USER_PLACEHOLDER|$WIN_SSH_USER|g" ~/.ssh/config

      - name: Ensure remote directory exists
        run: |
          ssh winserver "powershell -Command \"New-Item -Path '${{ env.DSC_PATH }}' -ItemType Directory -Force\""

      - name: Copy DSC scripts via jump host
        run: |
          scp dsc/HardeningConfig.ps1 dsc/IISConfig.ps1 dsc/Deploy-DSC.ps1 "winserver:${{ env.DSC_PATH }}/"

      - name: Apply DSC configurations
        run: |
          ssh winserver "powershell -ExecutionPolicy Bypass -File ${{ env.DSC_PATH }}\Deploy-DSC.ps1 -Mode Apply"

      - name: Verify DSC state
        run: |
          ssh winserver "powershell -ExecutionPolicy Bypass -File ${{ env.DSC_PATH }}\Deploy-DSC.ps1 -Mode Test"

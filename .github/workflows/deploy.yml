  name: Deploy Infrastructure

  on:
    push:
      branches: [main]

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Install Ansible
          run: sudo apt install -y ansible

        - name: Setup SSH
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/aws
            chmod 600 ~/.ssh/aws
            ssh-keyscan -p 2227 51.75.64.176 >> ~/.ssh/known_hosts

        - name: Run Ansible
          run: ansible-playbook -i inventory.ini site.yml
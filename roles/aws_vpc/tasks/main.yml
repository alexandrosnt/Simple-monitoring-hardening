---
- name: Create VPC
  amazon.aws.ec2_vpc_net:
    name: "{{ aws_vpc_name }}"
    cidr_block: "{{ aws_vpc_cidr }}"
    region: "{{ aws_vpc_region }}"
    endpoint_url: "{{ aws_vpc_endpoint_url }}"
    tags: "{{ aws_vpc_tags }}"
    state: present
  register: aws_vpc_result

- name: Create public subnet
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ aws_vpc_result.vpc.id }}"
    cidr: "{{ aws_vpc_subnets.public.cidr }}"
    az: "{{ aws_vpc_subnets.public.az }}"
    region: "{{ aws_vpc_region }}"
    endpoint_url: "{{ aws_vpc_endpoint_url }}"
    tags: "{{ aws_vpc_tags | combine({'Name': aws_vpc_subnets.public.name}) }}"
    state: present
  register: aws_vpc_public_subnet

- name: Create private subnet
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ aws_vpc_result.vpc.id }}"
    cidr: "{{ aws_vpc_subnets.private.cidr }}"
    az: "{{ aws_vpc_subnets.private.az }}"
    region: "{{ aws_vpc_region }}"
    endpoint_url: "{{ aws_vpc_endpoint_url }}"
    tags: "{{ aws_vpc_tags | combine({'Name': aws_vpc_subnets.private.name}) }}"
    state: present
  register: aws_vpc_private_subnet

- name: Create internet gateway
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ aws_vpc_result.vpc.id }}"
    region: "{{ aws_vpc_region }}"
    endpoint_url: "{{ aws_vpc_endpoint_url }}"
    tags: "{{ aws_vpc_tags | combine({'Name': aws_vpc_name + '-igw'}) }}"
    state: present
  register: aws_vpc_igw

- name: Create public route table
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ aws_vpc_result.vpc.id }}"
    region: "{{ aws_vpc_region }}"
    endpoint_url: "{{ aws_vpc_endpoint_url }}"
    tags: "{{ aws_vpc_tags | combine({'Name': aws_vpc_name + '-public-rt'}) }}"
    subnets:
      - "{{ aws_vpc_public_subnet.subnet.id }}"
    routes:
      - dest: "0.0.0.0/0"
        gateway_id: "{{ aws_vpc_igw.gateway_id }}"

- name: Create security group
  amazon.aws.ec2_security_group:
    name: "{{ aws_vpc_security_group_name }}"
    description: "{{ aws_vpc_name }} security group"
    vpc_id: "{{ aws_vpc_result.vpc.id }}"
    region: "{{ aws_vpc_region }}"
    endpoint_url: "{{ aws_vpc_endpoint_url }}"
    rules: "{{ aws_vpc_security_group_rules }}"
    tags: "{{ aws_vpc_tags }}"
    state: present
  register: aws_vpc_sg

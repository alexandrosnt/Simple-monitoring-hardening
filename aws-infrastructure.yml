---
- hosts: localstack
  gather_facts: false
  tasks:
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        endpoint_url: "{{ aws_endpoint_url }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        tags: "{{ common_tags }}"
        state: present
      register: vpc

    - name: Create public subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ subnets.public.cidr }}"
        az: "{{ subnets.public.az }}"
        region: "{{ aws_region }}"
        endpoint_url: "{{ aws_endpoint_url }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        tags: "{{ common_tags | combine({'Name': subnets.public.name}) }}"
        state: present
      register: public_subnet

    - name: Create private subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ subnets.private.cidr }}"
        az: "{{ subnets.private.az }}"
        region: "{{ aws_region }}"
        endpoint_url: "{{ aws_endpoint_url }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        tags: "{{ common_tags | combine({'Name': subnets.private.name}) }}"
        state: present
      register: private_subnet

    - name: Create internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        endpoint_url: "{{ aws_endpoint_url }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        tags: "{{ common_tags | combine({'Name': project_name + '-igw'}) }}"
        state: present
      register: igw

    - name: Create route table for public subnet
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        endpoint_url: "{{ aws_endpoint_url }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        tags: "{{ common_tags | combine({'Name': project_name + '-public-rt'}) }}"
        subnets:
          - "{{ public_subnet.subnet.id }}"
        routes:
          - dest: "0.0.0.0/0"
            gateway_id: "{{ igw.gateway_id }}"
      register: route_table
      ignore_errors: true  # LocalStack may not return 'Origin' field

    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ security_group_name }}"
        description: "{{ project_name }} security group"
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        endpoint_url: "{{ aws_endpoint_url }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        rules: "{{ security_group_rules }}"
        tags: "{{ common_tags }}"
        state: present
      register: sg

    - name: Create EC2 key pair
      amazon.aws.ec2_key:
        name: "{{ ec2_key_name }}"
        region: "{{ aws_region }}"
        endpoint_url: "{{ aws_endpoint_url }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        tags: "{{ common_tags }}"
        state: present
      register: key_pair

    - name: Display infrastructure summary
      debug:
        msg:
          - "VPC ID: {{ vpc.vpc.id }}"
          - "Public Subnet: {{ public_subnet.subnet.id }}"
          - "Private Subnet: {{ private_subnet.subnet.id }}"
          - "Internet Gateway: {{ igw.gateway_id }}"
          - "Security Group: {{ sg.group_id }}"
          - "Key Pair: {{ ec2_key_name }}"

- hosts: all
  tasks:
    - name: Create deploy user
      user:
        name: deploy
        shell: /bin/sh
        groups: wheel
        create_home: true

    - name: Set up SSH key for deploy user
      authorized_key:
        user: deploy
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Disable root SSH password login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
      notify: restart sshd

    - name: Install firewall
      apk:
        name: iptables
        state: present

  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted
- hosts: webservers
  tasks:
    - name: Install nginx
      apk:
        name: nginx
        state: present

    - name: Deploy config
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
      notify: restart nginx

    - name: Start nginx
      service:
        name: nginx
        state: started

  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted

- hosts: databases
  tasks:
    - name: Install postgres
      apk:
        name: postgresql
        state: present

    - name: Init database
      command: initdb -D /var/lib/postgresql/data
      args:
        creates: /var/lib/postgresql/data/PG_VERSION
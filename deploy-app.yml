- hosts: webservers
  tasks:
    - name: Install nginx
      apk:
        name: nginx
        state: present

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: true

- hosts: databases
  tasks:
    - name: Install postgresql
      apk:
        name: postgresql
        state: present

    - name: Install sudo
      apk:
        name: sudo
        state: present

    - name: Create postgres data directory
      file:
        path: /var/lib/postgresql/data
        state: directory
        owner: postgres
        group: postgres
        mode: "0700"

    - name: Init database
      command: initdb -D /var/lib/postgresql/data
      become: true
      become_user: postgres
      args:
        creates: /var/lib/postgresql/data/PG_VERSION

    - name: Start postgresql
      service:
        name: postgresql
        state: started
        enabled: true
